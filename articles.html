<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weaving Journal | The Loom of Time</title>
    <meta name="description" content="Explore articles, styling guides, and authentication checklists on Odisha handloom silk, Sambalpuri Ikat, and Khandua drapes from The Loom of Time." />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <!-- Shared Style Link -->
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      /* Article Specific Premium Styles */
      .articles-container {
        max-width: 900px;
        margin: 120px auto 80px auto;
        padding: 0 24px;
        position: relative;
        z-index: 10;
      }
      .back-to-loom {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--color-zari, #d4af37);
        text-decoration: none;
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 40px;
        transition: opacity 0.3s ease;
      }
      .back-to-loom:hover {
        opacity: 0.8;
      }
      .article-card-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 32px;
        margin-top: 40px;
      }
      .article-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 32px;
        border-radius: 4px;
        backdrop-filter: blur(10px);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
      }
      .article-card:hover {
        transform: translateY(-4px);
        border-color: var(--color-zari, #d4af37);
      }
      .article-card-title {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        margin-bottom: 12px;
        color: #fff;
        line-height: 1.3;
      }
      .article-card-meta {
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        color: var(--color-zari, #d4af37);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 16px;
      }
      .article-card-desc {
        font-family: 'Outfit', sans-serif;
        font-weight: 300;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
        margin-bottom: 24px;
      }
      .read-more-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: 'Outfit', sans-serif;
        color: #fff;
        text-decoration: none;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-bottom: 1px solid var(--color-zari, #d4af37);
        padding-bottom: 4px;
      }

      /* Single Article Details View */
      .article-detail-wrap {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 60px 48px;
        border-radius: 4px;
        backdrop-filter: blur(20px);
      }
      .article-detail-wrap article h1 {
        font-family: 'Playfair Display', serif;
        font-size: 44px;
        font-weight: 400;
        color: #fff;
        margin-bottom: 20px;
        line-height: 1.2;
      }
      .article-detail-wrap article h2 {
        font-family: 'Playfair Display', serif;
        font-size: 26px;
        font-weight: 400;
        color: var(--color-zari, #d4af37);
        margin: 40px 0 20px 0;
      }
      .article-detail-wrap article p {
        font-family: 'Outfit', sans-serif;
        font-weight: 300;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.8;
        margin-bottom: 24px;
      }
      .article-detail-wrap article p.intro {
        font-size: 18px;
        color: #fff;
        line-height: 1.8;
        border-left: 3px solid var(--color-zari, #d4af37);
        padding-left: 20px;
        margin-bottom: 32px;
      }
      .article-detail-wrap article ul, .article-detail-wrap article ol {
        margin: 20px 0 32px 24px;
      }
      .article-detail-wrap article li {
        font-family: 'Outfit', sans-serif;
        font-weight: 300;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.8;
        margin-bottom: 12px;
      }
      .article-detail-wrap article blockquote {
        margin: 32px 0;
        padding: 24px;
        background: rgba(212, 175, 55, 0.05);
        border-left: 4px solid var(--color-zari, #d4af37);
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 20px;
        color: #fff;
      }

      /* Breadcrumbs */
      .breadcrumbs {
        display: flex;
        gap: 8px;
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 32px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .breadcrumbs a {
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
      }
      .breadcrumbs span.current {
        color: var(--color-zari, #d4af37);
      }

      @media (max-width: 768px) {
        .article-detail-wrap {
          padding: 32px 20px;
        }
        .article-detail-wrap article h1 {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body class="admin-body">
    <!-- Starfield Background -->
    <div id="canvas-container" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.15; background:#050505;"></div>

    <div class="articles-container">
      <a href="/" class="back-to-loom">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Loom
      </a>

      <!-- Dynamic Breadcrumbs -->
      <div class="breadcrumbs" id="breadcrumbs-panel">
        <a href="/">Home</a> / <span class="current">Weaving Journal</span>
      </div>

      <!-- Articles list container -->
      <div id="articles-list-view">
        <h1 style="font-family:'Playfair Display', serif; font-size:42px; color:#fff; margin-bottom:12px;">Weaving Journal</h1>
        <p style="font-family:'Outfit', sans-serif; font-weight:300; font-size:16px; color:rgba(255, 255, 255, 0.6); margin-bottom:40px;">Authentic research, diaspora styling guides, and master weavers chronicles directly from the handlooms of Odisha.</p>
        
        <div class="article-card-grid" id="article-grid">
          <!-- Populated by JS -->
          <div class="article-card">
            <div class="article-card-meta">Loading Articles...</div>
          </div>
        </div>
      </div>

      <!-- Single article view -->
      <div id="article-detail-view" style="display:none;">
        <div class="article-detail-wrap" id="article-detail-content">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor-dot" id="cursor-dot"></div>
    <div class="custom-cursor-ring" id="cursor-ring"></div>

    <script type="module" src="/src/articles.js"></script>
  </body>
</html>
